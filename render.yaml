services:
  - type: web
    name: handlejobs-backend
    runtime: node
    plan: starter
    buildCommand: npm install && PLAYWRIGHT_BROWSERS_PATH=$PWD/.pw-browsers npx playwright install --with-deps chromium && ls -la $PWD/.pw-browsers && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        value: https://handlejobs.com
